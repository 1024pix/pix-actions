name: Docker generic Bake

on:
  workflow_call:
    inputs:
      runs-on:
        description: 'Runner to use for the job'
        required: false
        type: string
        default: 'ubuntu-latest'
      files:
        description: 'List of bake files'
        required: false
        type: string
      targets:
        description: 'List of bake targets'
        required: false
        type: string
      set:
        description: 'List of bake overrides'
        required: false
        type: string
      vars:
        description: 'List of bake variables'
        required: false
        type: string
    secrets:
      REGISTRY_ENDPOINT:
        required: false
      REGISTRY_USERNAME:
        required: false
      REGISTRY_TOKEN:
        required: false
      secret_vars:
        required: false

jobs:
  bake:
    runs-on: ${{ inputs.runs-on }}
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ secrets.REGISTRY_ENDPOINT }}
          username: ${{ secrets.REGISTRY_USERNAME || 'nologin' }}
          password: ${{ secrets.REGISTRY_TOKEN }}

      - name: Build and push with Docker Bake
        uses: docker/bake-action@v7
        with:
          files: ${{ inputs.files }}
          targets: ${{ inputs.targets }}
          set: ${{ inputs.set }}
          push: true
          vars: |
            REGISTRY=${{ secrets.REGISTRY_ENDPOINT }}
            ${{ inputs.vars }}
            ${{ secrets.secret_vars }}
      - name: Build summary
        run: |
          echo "## 🐳 Docker Bake completed successfully" >> $GITHUB_STEP_SUMMARY
